services:
  postgres:
    image: postgres:16
    container_name: boardbook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: boardbook
      POSTGRES_PASSWORD: boardbook
      POSTGRES_DB: boardbook
    ports:
      - "5432:5432"
    volumes:
      - boardbook_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boardbook -d boardbook"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  boardbook_postgres_data:
